name: Deploy Firebase

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: Ambiente de deploy
        type: choice
        options:
          - staging
          - production
        default: staging
        required: true

permissions:
  contents: read
  id-token: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      deploy_env: ${{ steps.resolve.outputs.deploy_env }}
      project_id: ${{ steps.resolve.outputs.project_id }}
    steps:
      - id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_ENV: ${{ github.event.inputs.environment }}
          STAGING_PROJECT: ${{ vars.FIREBASE_PROJECT_ID_STAGING }}
          PRODUCTION_PROJECT: ${{ vars.FIREBASE_PROJECT_ID_PRODUCTION }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "push" ]]; then
            DEPLOY_ENV="staging"
          else
            DEPLOY_ENV="${INPUT_ENV:-staging}"
          fi

          if [[ "$DEPLOY_ENV" == "production" ]]; then
            PROJECT_ID="$PRODUCTION_PROJECT"
          else
            PROJECT_ID="$STAGING_PROJECT"
          fi

          if [[ -z "${PROJECT_ID:-}" ]]; then
            if [[ "$EVENT_NAME" == "push" ]]; then
              echo "Projeto Firebase não configurado para $DEPLOY_ENV. Deploy será ignorado neste push."
              echo "deploy_env=$DEPLOY_ENV" >> "$GITHUB_OUTPUT"
              echo "project_id=" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Projeto Firebase não configurado para ambiente: $DEPLOY_ENV" >&2
            exit 1
          fi

          echo "deploy_env=$DEPLOY_ENV" >> "$GITHUB_OUTPUT"
          echo "project_id=$PROJECT_ID" >> "$GITHUB_OUTPUT"

  deploy:
    runs-on: ubuntu-latest
    needs: prepare
    if: ${{ needs.prepare.outputs.project_id != '' }}
    environment: ${{ needs.prepare.outputs.deploy_env }}
    concurrency:
      group: firebase-${{ needs.prepare.outputs.deploy_env }}
      cancel-in-progress: false
    env:
      FIREBASE_PROJECT_ID: ${{ needs.prepare.outputs.project_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Generate backend env for deploy
        env:
          GOOGLE_AI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
          GOOGLE_CALENDAR_TIMEZONE: ${{ vars.GOOGLE_CALENDAR_TIMEZONE }}
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          GMAIL_REDIRECT_URI: ${{ vars.GMAIL_REDIRECT_URI }}
          GMAIL_OAUTH_SCOPES: ${{ vars.GMAIL_OAUTH_SCOPES }}
        run: |
          set -euo pipefail

          if [[ -z "${GOOGLE_AI_API_KEY:-}" ]]; then
            echo "::warning::Secret GOOGLE_AI_API_KEY ausente. Rotas de transcrição/análise podem falhar."
          fi
          if [[ -z "${FIREBASE_STORAGE_BUCKET:-}" ]]; then
            echo "::warning::Secret FIREBASE_STORAGE_BUCKET ausente. Persistência de transcrições no Storage pode falhar."
          fi

          {
            echo "NODE_ENV=production"
            echo "FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}"
            [[ -n "${GOOGLE_AI_API_KEY:-}" ]] && echo "GOOGLE_AI_API_KEY=${GOOGLE_AI_API_KEY}"
            [[ -n "${FIREBASE_STORAGE_BUCKET:-}" ]] && echo "FIREBASE_STORAGE_BUCKET=${FIREBASE_STORAGE_BUCKET}"
            [[ -n "${GEMINI_MODEL:-}" ]] && echo "GEMINI_MODEL=${GEMINI_MODEL}"
            [[ -n "${GOOGLE_CALENDAR_ID:-}" ]] && echo "GOOGLE_CALENDAR_ID=${GOOGLE_CALENDAR_ID}"
            [[ -n "${GOOGLE_CALENDAR_TIMEZONE:-}" ]] && echo "GOOGLE_CALENDAR_TIMEZONE=${GOOGLE_CALENDAR_TIMEZONE}"
            [[ -n "${GMAIL_CLIENT_ID:-}" ]] && echo "GMAIL_CLIENT_ID=${GMAIL_CLIENT_ID}"
            [[ -n "${GMAIL_CLIENT_SECRET:-}" ]] && echo "GMAIL_CLIENT_SECRET=${GMAIL_CLIENT_SECRET}"
            [[ -n "${GMAIL_REFRESH_TOKEN:-}" ]] && echo "GMAIL_REFRESH_TOKEN=${GMAIL_REFRESH_TOKEN}"
            [[ -n "${GMAIL_REDIRECT_URI:-}" ]] && echo "GMAIL_REDIRECT_URI=${GMAIL_REDIRECT_URI}"
            [[ -n "${GMAIL_OAUTH_SCOPES:-}" ]] && echo "GMAIL_OAUTH_SCOPES=${GMAIL_OAUTH_SCOPES}"
          } > backend/.env

      - name: Lint frontend (if configured)
        run: |
          if ls .eslintrc* eslint.config.* >/dev/null 2>&1; then
            npm run lint
          else
            echo "Configuração ESLint não encontrada; etapa ignorada."
          fi
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Validate backend syntax
        run: npm run lint
        working-directory: backend

      - id: auth
        name: Authenticate to Google Cloud (OIDC)
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.FIREBASE_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          create_credentials_file: true

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Verify ADC
        run: gcloud auth application-default print-access-token >/dev/null

      - name: Install Firebase CLI
        run: npm install --global firebase-tools@latest

      - name: Deploy functions + hosting
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}
        run: |
          firebase deploy \
            --project "$FIREBASE_PROJECT_ID" \
            --only functions:api,hosting \
            --non-interactive \
            --debug

      - name: Smoke test (API health)
        run: |
          set -euo pipefail
          URL="https://${FIREBASE_PROJECT_ID}.web.app/api/health"
          echo "Verificando $URL"
          for attempt in 1 2 3 4 5; do
            if curl --fail --silent --show-error "$URL" > /tmp/health.json; then
              cat /tmp/health.json
              exit 0
            fi
            sleep 10
          done
          echo "Smoke test falhou após 5 tentativas." >&2
          exit 1
