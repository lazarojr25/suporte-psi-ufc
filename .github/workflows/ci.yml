name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Lint frontend (if configured)
        run: |
          if ls .eslintrc* eslint.config.* >/dev/null 2>&1; then
            npm run lint
          else
            echo "Configuração ESLint não encontrada; etapa ignorada."
          fi
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Validate backend syntax
        run: npm run lint
        working-directory: backend
